name: Build & Release MoonJoy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Windows MSI
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pyinstaller

      - name: Build with PyInstaller (onefile)
        run: |
          python -m PyInstaller `
            --name MoonJoy `
            --onefile `
            --windowed `
            --noconfirm `
            --clean `
            --icon assets/icon.ico `
            --add-data "assets;assets" `
            --collect-all PIL `
            --hidden-import moonjoy `
            --hidden-import moonjoy.screensaver `
            --hidden-import moonjoy.wallpaper_daemon `
            --hidden-import moonjoy.gui `
            --hidden-import moonjoy.config `
            --hidden-import moonjoy.image_scanner `
            --hidden-import moonjoy.nasa_data `
            --hidden-import moonjoy.wallpaper `
            --distpath dist/windows `
            moonjoy/__main__.py

      - name: Create MSI with WiX
        shell: pwsh
        run: |
          # WiX source — single exe, desktop + start menu shortcuts
          $wxsContent = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="MoonJoy" Manufacturer="Platysoft" Version="1.0.0"
                     UpgradeCode="7A3B62D0-9F1E-4C8A-B5D2-000000000001"
                     InstallerVersion="500" Scope="perMachine">
              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <Feature Id="Main" Title="MoonJoy" Level="1">
                <ComponentRef Id="MainExe" />
                <ComponentRef Id="DesktopShortcut" />
                <ComponentRef Id="StartMenuShortcut" />
              </Feature>
            </Package>

            <Fragment>
              <StandardDirectory Id="ProgramFiles64Folder">
                <Directory Id="PlatysoftFolder" Name="Platysoft">
                  <Directory Id="INSTALLFOLDER" Name="MoonJoy" />
                </Directory>
              </StandardDirectory>
              <StandardDirectory Id="DesktopFolder" />
              <StandardDirectory Id="ProgramMenuFolder" />
            </Fragment>

            <Fragment>
              <Component Id="MainExe" Directory="INSTALLFOLDER" Guid="7A3B62D0-9F1E-4C8A-B5D2-000000000010">
                <File Id="MoonJoyExe" Source="dist\windows\MoonJoy.exe" KeyPath="yes" />
              </Component>
              <Component Id="DesktopShortcut" Directory="DesktopFolder" Guid="7A3B62D0-9F1E-4C8A-B5D2-000000000002">
                <Shortcut Id="DesktopLink" Name="MoonJoy" Target="[INSTALLFOLDER]MoonJoy.exe" WorkingDirectory="INSTALLFOLDER" Icon="MoonJoyIcon" />
                <RegistryValue Root="HKCU" Key="Software\Platysoft\MoonJoy" Name="DesktopShortcut" Type="integer" Value="1" KeyPath="yes" />
              </Component>
              <Component Id="StartMenuShortcut" Directory="ProgramMenuFolder" Guid="7A3B62D0-9F1E-4C8A-B5D2-000000000003">
                <Shortcut Id="StartMenuLink" Name="MoonJoy" Target="[INSTALLFOLDER]MoonJoy.exe" WorkingDirectory="INSTALLFOLDER" Icon="MoonJoyIcon" />
                <RegistryValue Root="HKCU" Key="Software\Platysoft\MoonJoy" Name="StartMenuShortcut" Type="integer" Value="1" KeyPath="yes" />
              </Component>
            </Fragment>

            <Fragment>
              <Icon Id="MoonJoyIcon" SourceFile="assets\icon.ico" />
            </Fragment>
          </Wix>
          "@
          Set-Content -Path "dist/MoonJoy.wxs" -Value $wxsContent

          # Install WiX
          dotnet tool install --global wix --version 5.0.2

          # Build MSI
          wix build -o dist/windows/MoonJoy-1.0.0-win64.msi dist/MoonJoy.wxs

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/windows/MoonJoy-1.0.0-win64.msi

  # ═══════════════════════════════════════════════════════════════
  # macOS DMG
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pyinstaller

      - name: Build app
        run: |
          python -m PyInstaller \
            --name MoonJoy \
            --onedir \
            --windowed \
            --noconfirm \
            --clean \
            --icon assets/icon.icns \
            --add-data "assets:assets" \
            --collect-all PIL \
            --hidden-import moonjoy \
            --hidden-import moonjoy.screensaver \
            --hidden-import moonjoy.wallpaper_daemon \
            --hidden-import moonjoy.gui \
            --hidden-import moonjoy.config \
            --hidden-import moonjoy.image_scanner \
            --hidden-import moonjoy.nasa_data \
            --hidden-import moonjoy.wallpaper \
            --osx-bundle-identifier com.platysoft.moonjoy \
            --distpath dist/macos \
            moonjoy/__main__.py

      - name: Patch Info.plist
        run: |
          PLIST="dist/macos/MoonJoy.app/Contents/Info.plist"
          # Add keys required for macOS GUI + Automation permissions
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string MoonJoy" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSHighResolutionCapable bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppleEventsUsageDescription string MoonJoy needs permission to change your desktop wallpaper." "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 11.0" "$PLIST" 2>/dev/null || true

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep -s - dist/macos/MoonJoy.app

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -R dist/macos/MoonJoy.app dist/dmg_staging/
          ln -sf /Applications dist/dmg_staging/Applications
          hdiutil create -volname "MoonJoy" -srcfolder dist/dmg_staging -ov -format UDZO "dist/MoonJoy-1.0.0-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/MoonJoy-1.0.0-macOS.dmg

  # ═══════════════════════════════════════════════════════════════
  # Linux .deb
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y python3-tk
          python -m pip install --upgrade pip
          pip install Pillow pyinstaller

      - name: Build binary
        run: |
          python -m PyInstaller \
            --name MoonJoy \
            --onefile \
            --noconfirm \
            --clean \
            --add-data "assets:assets" \
            --collect-all PIL \
            --hidden-import moonjoy \
            --hidden-import moonjoy.screensaver \
            --hidden-import moonjoy.wallpaper_daemon \
            --hidden-import moonjoy.gui \
            --hidden-import moonjoy.config \
            --hidden-import moonjoy.image_scanner \
            --hidden-import moonjoy.nasa_data \
            --hidden-import moonjoy.wallpaper \
            --hidden-import _tkinter \
            --collect-all tkinter \
            --distpath dist/linux \
            moonjoy/__main__.py

      - name: Create .deb package
        run: |
          PKG_DIR="dist/moonjoy_1.0.0_amd64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/opt/moonjoy"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/bin"

          # Copy single self-contained binary
          cp dist/linux/MoonJoy "$PKG_DIR/opt/moonjoy/MoonJoy"
          chmod +x "$PKG_DIR/opt/moonjoy/MoonJoy"

          # Install icon
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"
          cp assets/logo.png "$PKG_DIR/usr/share/icons/hicolor/256x256/apps/moonjoy.png"

          cat > "$PKG_DIR/DEBIAN/control" << 'CTRL'
          Package: moonjoy
          Version: 1.0.0
          Section: graphics
          Priority: optional
          Architecture: amd64
          Depends: libx11-6, libxft2, libxss1, libxext6, fonts-dejavu-core
          Maintainer: Platysoft <info@platysoft.com>
          Homepage: https://platysoft.com/
          Description: NASA Image Screensaver & Wallpaper Rotator
           MoonJoy is a self-contained screensaver and wallpaper rotator
           featuring NASA imagery with live Artemis mission data overlay.
           By Platysoft.
          CTRL
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          cat > "$PKG_DIR/DEBIAN/postinst" << 'POSTINST'
          #!/bin/bash
          chmod +x /opt/moonjoy/MoonJoy
          ln -sf /opt/moonjoy/MoonJoy /usr/bin/moonjoy
          POSTINST
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/postinst"
          chmod 755 "$PKG_DIR/DEBIAN/postinst"

          cat > "$PKG_DIR/DEBIAN/prerm" << 'PRERM'
          #!/bin/bash
          rm -f /usr/bin/moonjoy
          PRERM
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/prerm"
          chmod 755 "$PKG_DIR/DEBIAN/prerm"

          cat > "$PKG_DIR/usr/share/applications/moonjoy.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=MoonJoy
          Comment=NASA Image Screensaver & Wallpaper Rotator by Platysoft
          Exec=/opt/moonjoy/MoonJoy gui
          Icon=moonjoy
          Type=Application
          Categories=Utility;Graphics;
          Terminal=false
          DESKTOP
          sed -i 's/^          //' "$PKG_DIR/usr/share/applications/moonjoy.desktop"

          dpkg-deb --build --root-owner-group "$PKG_DIR"
          mv dist/moonjoy_1.0.0_amd64.deb dist/MoonJoy-1.0.0-linux-amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/MoonJoy-1.0.0-linux-amd64.deb

  # ═══════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MoonJoy ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            ## MoonJoy ${{ github.ref_name }} — NASA Image Screensaver & Wallpaper Rotator

            Developed by [Platysoft](https://platysoft.com/)

            ### Downloads

            | Platform | File | Install |
            |----------|------|---------|
            | **Windows** | `MoonJoy-1.0.0-win64.msi` | Double-click MSI to install |
            | **macOS** | `MoonJoy-1.0.0-macOS.dmg` | Open DMG, drag to Applications |
            | **Linux** | `MoonJoy-1.0.0-linux-amd64.deb` | `sudo dpkg -i MoonJoy-*.deb` |

            ### Features
            - 🖼️ Fullscreen screensaver slideshow of NASA imagery
            - 🌙 Live NASA Artemis mission data overlay (Artemis I–V)
            - 🚀 20+ upcoming NASA launch dates
            - 🖥️ Desktop wallpaper rotator with configurable interval
            - ⚙️ Settings GUI to configure intervals, shuffle, fit mode
            - 🪟 Windows screensaver (.scr) support
            - 🐧 Linux systemd service for auto-start wallpaper rotation
            - 🍎 macOS launchd integration

            ### Quick Start
            1. Install using the appropriate package for your OS
            2. Place your NASA images in an `Images/` folder next to the app
            3. Run `MoonJoy` to open settings, or `MoonJoy screensaver` for immediate slideshow

            ---
            *[platysoft.com](https://platysoft.com/)*
          files: |
            artifacts/windows-msi/MoonJoy-1.0.0-win64.msi
            artifacts/macos-dmg/MoonJoy-1.0.0-macOS.dmg
            artifacts/linux-deb/MoonJoy-1.0.0-linux-amd64.deb
